name: release

on:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  lint:
    uses: platform-mesh/.github/.github/workflows/job-golang-lint.yml@cd5bbb070e082d6b02743b21350ec5d859be0a02 # main
    with:
      useTask: true

  test:
    uses: ./.github/workflows/job-golang-test-source.yml
    secrets: inherit # zizmor: ignore[secrets-inherit]
    with:
      runsOn: 'ubuntu-latest-large'

  create-version:
    uses: platform-mesh/.github/.github/workflows/job-create-version.yml@cd5bbb070e082d6b02743b21350ec5d859be0a02 # main
    secrets: inherit # zizmor: ignore[secrets-inherit]
    permissions:
      contents: write # Needed for job-create-version to push the new version tag

  docker-build-push:
    needs: [create-version, lint, test]
    uses: platform-mesh/.github/.github/workflows/job-docker-build-push.yml@cd5bbb070e082d6b02743b21350ec5d859be0a02 # main
    secrets: inherit # zizmor: ignore[secrets-inherit]
    permissions:
      contents: write # Needed for job-docker-build-push to push the release tag
      packages: write # Needed to push the container image to GHCR
      id-token: write # Needed for keyless (OIDC) image signing
    with:
      imageTagName: ghcr.io/platform-mesh/platform-mesh-operator
      version: ${{ needs.create-version.outputs.version }}
      multiarch: true

  update-version:
    needs: [create-version, docker-build-push]
    uses: platform-mesh/.github/.github/workflows/job-chart-version-update.yml@cd5bbb070e082d6b02743b21350ec5d859be0a02 # main
    secrets: inherit # zizmor: ignore[secrets-inherit]
    with:
      appVersion: ${{ needs.create-version.outputs.version }}
      chart: platform-mesh-operator
      targetRepository: platform-mesh/helm-charts

  sbom:
    needs: [create-version, docker-build-push]
    uses: platform-mesh/.github/.github/workflows/job-sbom.yml@cd5bbb070e082d6b02743b21350ec5d859be0a02 # main
    permissions:
      contents: read
      packages: read # Needed for job-sbom to pull the image to generate the SBOM
    with:
      imageReference: ghcr.io/platform-mesh/platform-mesh-operator:${{ needs.create-version.outputs.version }}

  image-ocm:
    needs: [create-version, docker-build-push, sbom]
    uses: platform-mesh/.github/.github/workflows/job-image-ocm.yml@cd5bbb070e082d6b02743b21350ec5d859be0a02 # main
    secrets: inherit # zizmor: ignore[secrets-inherit]
    permissions:
      contents: read
      packages: write # Needed for job-image-ocm to push the OCM component to GHCR
    with:
      imageReference: ghcr.io/platform-mesh/platform-mesh-operator:${{ needs.create-version.outputs.version }}
      appVersion: ${{ needs.create-version.outputs.version }}
      repoName: platform-mesh-operator
      commit: ${{ github.sha }}

  scan-sbom:
    needs: [create-version, docker-build-push, sbom, image-ocm]
    uses: platform-mesh/.github/.github/workflows/job-trivy-sbom.yml@cd5bbb070e082d6b02743b21350ec5d859be0a02 # main
    permissions:
      contents: read
      packages: read # Needed for job-trivy-sbom to pull the SBOM/image to scan
      security-events: write # Needed to upload Trivy results to code scanning
    with:
      componentVersion: ${{ needs.create-version.outputs.version }}
