apiVersion: source.toolkit.fluxcd.io/v1beta2
kind: OCIRepository
metadata:
  name: ocm-k8s-toolkit
  namespace: default
spec:
  interval: 5m
  url: oci://ghcr.io/open-component-model/kubernetes/controller/chart
  ref:
    tag: "0.3.0"
---

apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ocm-k8s-toolkit
  namespace: default
spec:
  releaseName: ocm-k8s-toolkit
  interval: 1m
  timeout: 15m
  targetNamespace: ocm-system
  chartRef:
    kind: OCIRepository
    name: ocm-k8s-toolkit
  values:
    manager:
      concurrency:
        resource: 21
      logging:
        level: "4"
