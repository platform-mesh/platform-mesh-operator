# E2E-only preset fixture (kind tests). Not shipped in pkg/rbacpresets/providers.
kind: ProviderRBACPreset
metadata:
  name: e2e-wtvw
spec:
  serverTarget:
    type: workspaceTypeVirtualWorkspace
    workspaceTypeName: e2e-preset-target
    workspaceTypePath: root
  serviceAccountWorkspace: root
  serviceAccountName: "platform-mesh-provider-{{ .Suffix }}"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: "{{ .SAName }}"
  namespace: default
  annotations:
    rbacpresets.platform-mesh.io/workspace: root
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: "{{ .SAName }}"
  annotations:
    rbacpresets.platform-mesh.io/workspace: root
rules:
  - apiGroups: ["tenancy.kcp.io"]
    resources: ["workspaces"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: "{{ .SAName }}"
  annotations:
    rbacpresets.platform-mesh.io/workspace: root
subjects:
  - kind: ServiceAccount
    name: "{{ .SAName }}"
    namespace: default
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: "{{ .SAName }}"
