name: Golang Test Source
on:
  workflow_call:
    inputs:
      runsOn:
        required: false
        type: string
        default: 'ubuntu-latest'

permissions:
  contents: read # Needed for actions/checkout to read the repository

jobs:
  test:
    name: test
    runs-on: ${{ inputs.runsOn }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: 'go.mod'
          cache: true
      - name: Install Task
        uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2.0.0
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Export tokens
        env:
          REGISTRY_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "WORKFLOW_GITHUB_PAT=${REGISTRY_TOKEN}" >> $GITHUB_ENV
      - name: Map kcp front-proxy hostname for e2e tests
        run: echo "127.0.0.1 root.kcp.localhost" | sudo tee -a /etc/hosts
      - name: Run tests
        run: |
          GITHUB_WORKFLOW=ci task test ADDITIONAL_COMMAND_ARGS="-covermode=atomic -coverpkg=./..."
      - name: Install Code Coverage
        run: go install github.com/vladopajic/go-test-coverage/v2@v2.18.3
      - name: Check Test Coverage
        run: go-test-coverage --profile cover.out --config ./.testcoverage.yml
