{{- if .traefik.enabled }}
apiVersion: delivery.ocm.software/v1alpha1
kind: Resource
metadata:
  labels:
    artifact: image
    repo: oci
    for: {{ .traefik.name }}
  annotations:
    path: image.tag
  name: {{ .traefik.name }}-image
  namespace: {{ .helmReleaseNamespace }}
spec:
  componentRef:
    name: {{ .ocm.component.name }}
  ocmConfig:
    - apiVersion: delivery.ocm.software/v1alpha1
      kind: Repository
      name: {{ .ocm.repo.name }}
      namespace: {{ .releaseNamespace }}
  resource:
    byReference:
      referencePath:
      {{- range .ocm.referencePath }}
        - name: {{ .name }}
      {{- end }}
        - name: {{ .traefik.name }}
      resource:
        name: image
  # traefik's chart image schema is strict (additionalProperties: false) and has
  # no digest field, so only registry/repository/tag are injected (no digest).
  additionalStatusFields:
    registry: resource.access.imageReference.toOCI().registry
    repository: resource.access.imageReference.toOCI().repository
    tag: resource.access.imageReference.toOCI().tag
{{- end }}
