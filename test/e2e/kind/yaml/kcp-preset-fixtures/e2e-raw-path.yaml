# E2E-only preset fixture (kind tests). Not shipped in pkg/rbacpresets/providers.
apiVersion: rbacpresets.platform-mesh.io/v1alpha1
kind: ProviderRBACPreset
metadata:
  name: e2e-raw-path
spec:
  serverTarget:
    type: rawPath
    rawPath: /services/marketplace
  serviceAccountWorkspace: root:platform-mesh-system
  serviceAccountName: "platform-mesh-provider-{{ .Suffix }}"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: "{{ .SAName }}"
  namespace: default
  annotations:
    rbacpresets.platform-mesh.io/workspace: root:platform-mesh-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: "{{ .SAName }}"
  annotations:
    rbacpresets.platform-mesh.io/workspace: root:platform-mesh-system
rules:
  - nonResourceURLs: ["/services", "/services/*"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: "{{ .SAName }}"
  annotations:
    rbacpresets.platform-mesh.io/workspace: root:platform-mesh-system
subjects:
  - kind: ServiceAccount
    name: "{{ .SAName }}"
    namespace: default
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: "{{ .SAName }}"
