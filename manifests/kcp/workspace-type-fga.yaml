apiVersion: tenancy.kcp.io/v1alpha1
kind: WorkspaceType
metadata:
  name: security
spec:
  initializer: true
  terminator: true
  # Mirrors the PolicyRules the providerconnection feature derives from the
  # core.platform-mesh.io APIExport (getPolicyRulesFromAPIExport). KCP allows
  # these for the initializer inside the workspaces it initializes.
  initializerPermissions:
  # served resources
  - apiGroups: ["core.platform-mesh.io"]
    resources: ["accountinfos"]
    verbs: ["*"]
  - apiGroups: ["core.platform-mesh.io"]
    resources: ["accountinfos/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["core.platform-mesh.io"]
    resources: ["accounts"]
    verbs: ["*"]
  - apiGroups: ["core.platform-mesh.io"]
    resources: ["accounts/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["ui.platform-mesh.io"]
    resources: ["contentconfigurations"]
    verbs: ["*"]
  - apiGroups: ["ui.platform-mesh.io"]
    resources: ["contentconfigurations/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["ui.platform-mesh.io"]
    resources: ["providermetadatas"]
    verbs: ["*"]
  - apiGroups: ["ui.platform-mesh.io"]
    resources: ["providermetadatas/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["core.platform-mesh.io"]
    resources: ["authorizationmodels"]
    verbs: ["*"]
  - apiGroups: ["core.platform-mesh.io"]
    resources: ["authorizationmodels/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["core.platform-mesh.io"]
    resources: ["stores"]
    verbs: ["*"]
  - apiGroups: ["core.platform-mesh.io"]
    resources: ["stores/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["core.platform-mesh.io"]
    resources: ["invites"]
    verbs: ["*"]
  - apiGroups: ["core.platform-mesh.io"]
    resources: ["invites/status"]
    verbs: ["get", "update", "patch"]
  # permission claims
  - apiGroups: ["tenancy.kcp.io"]
    resources: ["workspaces"]
    verbs: ["*"]
  - apiGroups: ["tenancy.kcp.io"]
    resources: ["workspaces/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["tenancy.kcp.io"]
    resources: ["workspacetypes"]
    verbs: ["*"]
  - apiGroups: ["tenancy.kcp.io"]
    resources: ["workspacetypes/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["apis.kcp.io"]
    resources: ["apibindings"]
    verbs: ["*"]
  - apiGroups: ["apis.kcp.io"]
    resources: ["apibindings/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["apis.kcp.io"]
    resources: ["apiexports"]
    verbs: ["*"]
  - apiGroups: ["apis.kcp.io"]
    resources: ["apiexports/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["apis.kcp.io"]
    resources: ["apiresourceschemas"]
    verbs: ["*"]
  - apiGroups: ["apis.kcp.io"]
    resources: ["apiresourceschemas/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["core.kcp.io"]
    resources: ["logicalclusters"]
    verbs: ["*"]
  - apiGroups: ["core.kcp.io"]
    resources: ["logicalclusters/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["*"]
  - apiGroups: [""]
    resources: ["secrets/status"]
    verbs: ["get", "update", "patch"]
  # export infrastructure
  - apiGroups: ["apis.kcp.io"]
    resources: ["apiexports/content"]
    resourceNames: ["core.platform-mesh.io"]
    verbs: ["*"]
  - apiGroups: ["apis.kcp.io"]
    resources: ["apiexportendpointslices"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apis.kcp.io"]
    resources: ["apibindings"]
    verbs: ["get", "list", "watch"]
  - nonResourceURLs: ["/api", "/api/*", "/apis", "/apis/*", "/clusters/*", "/services", "/services/*"]
    verbs: ["get"]
