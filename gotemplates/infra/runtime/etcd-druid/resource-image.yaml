{{- if .etcdDruid.enabled }}
apiVersion: delivery.ocm.software/v1alpha1
kind: Resource
metadata:
  annotations:
    artifact: image
    repo: oci
    for: {{ .etcdDruid.name }}
    path: image.tag
    # etcd-druid's chart exposes only a single host-qualified image.repository
    # + image.tag (no registry/digest), so fold the registry into the repository.
    image-ref: combined
  name: {{ .etcdDruid.name }}-image
  namespace: {{ .releaseNamespace }}
spec:
  componentRef:
    name: {{ .ocm.component.name }}
  ocmConfig:
    - apiVersion: delivery.ocm.software/v1alpha1
      kind: Repository
      name: {{ .ocm.repo.name }}
      namespace: {{ .releaseNamespace }}
  resource:
    byReference:
      referencePath:
      {{- range .ocm.referencePath }}
        - name: {{ .name }}
      {{- end }}
        - name: {{ .etcdDruid.name }}
      resource:
        name: {{ .etcdDruid.name }}
  additionalStatusFields:
    registry: resource.access.imageReference.toOCI().registry
    repository: resource.access.imageReference.toOCI().repository
    tag: resource.access.imageReference.toOCI().tag
{{- end }}
