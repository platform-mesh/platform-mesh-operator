{{ $values := .values }}
{{- range $service, $config := .values.services }}
{{- if $config.enabled }}
apiVersion: delivery.ocm.software/v1alpha1
kind: Resource
metadata:
  name: "{{ $service }}-chart"
  namespace: {{ $.releaseNamespace }}
  labels:
    artifact: chart
    {{- if $config.gitRepo }}
    repo: git
    {{- else }}
    repo: oci
    {{- end }}
  {{- with ($config.chartResources).annotations }}
  annotations:
    {{- toYaml $config.chartResources.annotations | nindent 4 }}
  {{- end }}
spec:
  componentRef:
    {{- if (($config.ocm).component).name }}
    name: {{ $config.ocm.component.name }}
    {{- else }}
    name: {{ $values.ocm.component.name }}
    {{- end }}
  resource:
    byReference:
      resource:
        name: chart
      referencePath:
        {{- if $config.absoluteReferencePath }}
        {{- toYaml $config.absoluteReferencePath | nindent 8 }}
        {{- else if $config.referencePath }}
        {{- with $values.ocm.referencePath }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- toYaml $config.referencePath | nindent 8 }}
        {{- else }}
        {{- with $values.ocm.referencePath }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        - name: {{ $service }}
        {{- end }}
        {{- if not $config.absoluteReferencePath }}
        {{- if not $config.external }}
        - name: chart
        {{- end }}
        {{- end }}
  ocmConfig:
    - kind: Repository
      apiVersion: delivery.ocm.software/v1alpha1
      {{- if (($config.ocm).repo).name }}
      name: {{ $config.ocm.repo.name }}
      {{- else }}
      name: {{ $values.ocm.repo.name }}
      {{- end }}
      namespace: {{ $.releaseNamespace }}
---
{{ end -}}
{{ end -}}
