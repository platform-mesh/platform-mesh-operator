apiVersion: core.platform-mesh.io/v1alpha1
kind: PlatformMesh
metadata:
  name: platform-mesh
  namespace: platform-mesh-system
spec:
  exposure:
    port: 8443
    baseDomain: "portal.localhost"
  ocm:
    repo:
      name: platform-mesh
    component:
      name: platform-mesh
    referencePath: []
  featureToggles:
  - name: feature-enable-getting-started
  - name: feature-disable-email-verification
  - name: feature-accounts-in-accounts
  values:
    account-operator:
      values:
        hostAliases:
          enabled: true
        log:
          noJson: true
    keycloak:
      enabled: true
      values:
        service:
          clusterIP: 10.96.0.110
        resources:
          limits:
            cpu: "2"
            ephemeral-storage: 2Gi
            memory: 2Gi
          requests:
            cpu: 750m
            ephemeral-storage: 50Mi
            memory: 1Gi
      suspend: true
      imageResources:
        - name: keycloak-image
          annotations:
            repo: oci
            artifact: image
            for: keycloak
        - name: keycloak-postgresql-image
          resource: postgresql-image
          annotations:
            repo: oci
            artifact: image
            for: keycloak
            path: postgresql.image.tag
            unsuspend: "true"
    infra:
      imageResources: [] # Disable kcp-image OCM Resource to allow custom kcp.image.tag
      values:
        kcp:
          auth:
            serviceAccount:
              enabled: true
          image:
            tag: "v0.31.0" # bump kcp image to work around WatchList issues
          shards: []
          frontProxy:
            clusterIP: "10.96.0.100"
            port: 8443
        traefik:
          accessControlAllowOriginList:
          - "http://localhost:4200"
          - "http://localhost:4300"
          - "http://*.localhost:4200"
          - "http://*.localhost:4300"
          - "http://sub.localhost:4300"
          - "https://portal.localhost:8443"
          - "https://*.portal.localhost:8443"
        cors:
          enabled: true
        hostAliases:
          enabled: true
    security-operator:
      values:
        log:
          noJson: true
        system:
          extraArgs:
          - --idp-smtp-server=mailpit.platform-mesh-system.svc.cluster.local
          - --idp-smtp-port=1025
          - --idp-from-address=keycloak@portal.localhost
          - --set-default-password
          - --idp-registration-allowed
        fga:
          extraArgs:
            - --idp-smtp-server=mailpit.platform-mesh-system.svc.cluster.local
            - --idp-smtp-port=1025
            - --idp-from-address=keycloak@portal.localhost
            - --set-default-password
            - --idp-registration-allowed
            - --domain-ca-lookup
            - --development-allow-unverified-emails
            - --idp-additional-redirect-urls=http://localhost:8000/callback*,http://localhost:4300/callback*,http://sub.localhost:4300/callback*
        initializer:
          extraArgs:
          - --domain-ca-lookup
          - --idp-registration-allowed
          - --development-allow-unverified-emails
          - --idp-additional-redirect-urls=http://localhost:8000/callback*,http://localhost:4300/callback*,http://sub.localhost:4300/callback*
        caSecret: domain-certificate-ca
        hostAliases:
          enabled: true
    portal:
      enabled: true
      values:
        kcp:
          url: "https://localhost:8443"
        extraEnvVars:
        - name: OPENMFP_PORTAL_CONTEXT_IAM_SERVICE_API_URL
          value: https://${org-subdomain}{{ .Values.baseDomainPort }}/iam/graphql
        - name: OPENMFP_PORTAL_CONTEXT_CRD_GATEWAY_API_URL
          value: "https://${org-subdomain}{{ .Values.baseDomainPort }}/gateway/api/clusters/root:orgs:${org-name}/graphql"
        - name: NODE_EXTRA_CA_CERTS
          value: /etc/ssl/certs/domain-ca.crt
        extraVolumes:
        - name: domain-ca
          secret:
            secretName: domain-certificate-ca
        extraVolumeMounts:
        - name: domain-ca
          mountPath: /etc/ssl/certs/domain-ca.crt
          subPath: tls.crt
          readOnly: true
        hostAliases:
          enabled: true
          entries:
          - ip: "10.96.188.4"
            hostnames:
            - "localhost"
            - "portal.localhost"
            - "kcp.localhost"
            - "root.kcp.localhost"
            - "nereus.kcp.localhost"
            - "triton.kcp.localhost"
    openfga:
      suspend: true
      enabled: true
      values:
        datastore:
          uri: "postgres://postgres:password@openfga-postgres.platform-mesh-system.svc.cluster.local:5432/postgres?sslmode=disable"
        postgresql:
          auth:
            postgresPassword: password
            database: postgres
          image:
            repository: upstream-images/postgresql
    terminal-controller-manager:
      enabled: false
    rebac-authz-webhook:
      values:
        hostAliases:
          enabled: true
    iam-service:
      values:
        extraArgs:
        - --no-json
        cors:
          enabled: true
        hostAliases:
          enabled: true
    init-agent:
      values:
        hostAliases:
          enabled: true
    extension-manager-operator:
      values:
        hostAliases:
          enabled: true
    kubernetes-graphql-gateway:
      values:
        hostAliases:
          enabled: true
        listener:
          anchorResource: 'object.metadata.name.contains("platform-mesh.io")'
    kcp-operator:
      external: true
    kcp:
      external: true
    virtual-workspaces:
      values:
        deployment:
          serverUrl: https://frontproxy-front-proxy.platform-mesh-system:8443